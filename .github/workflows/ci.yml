name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Build and test with GCC - focuses on C compilation and validation
  build-and-test-gcc:
    runs-on: ubuntu-latest
    
    env:
      # Strict compilation flags for GCC (includes -Werror for CI quality assurance)
      GCC_FLAGS: "-Wall -Wextra -Wpedantic -Wformat=2 -Wconversion -Wsign-conversion -Werror -std=c99 -D_POSIX_C_SOURCE=200809L"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Print environment versions
      run: |
        echo "GCC version: $(gcc --version | head -1)"
      
    - name: Build with GCC (with warnings)
      run: gcc -Wall -Wextra -o hello hello.c
      
    - name: Test GCC build
      run: ./hello
      
    - name: Build code metrics tool with strict flags
      run: |
        gcc ${{ env.GCC_FLAGS }} -o metrics_tool metrics_tool.c code_metrics.c
      
    - name: Test metrics tool
      run: |
        ./metrics_tool --version
        ./metrics_tool --help
        ./metrics_tool --csv hello.c
        ./metrics_tool -n hello.c
      
    - name: Run metrics tool tests
      run: bash test/test_metrics.sh
      
    - name: Run validation tests
      run: bash test/validate.sh --quiet
      
  # Build and test with Clang - alternative C compiler validation
  build-and-test-clang:
    runs-on: ubuntu-latest
    
    env:
      # Portable compilation flags for Clang (no -Werror for cross-compiler compatibility)
      CLANG_FLAGS: "-Wall -Wextra -Wpedantic -Wformat=2 -Wconversion -Wsign-conversion -std=c99 -D_POSIX_C_SOURCE=200809L"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Print environment versions
      run: |
        echo "Clang version: $(clang --version | head -1)"
      
    - name: Build with Clang
      run: clang -Wall -Wextra -o hello_clang hello.c
      
    - name: Test Clang build
      run: ./hello_clang
      
    - name: Build code metrics tool with Clang (without -Werror for portability)
      run: |
        clang ${{ env.CLANG_FLAGS }} -o metrics_tool_clang metrics_tool.c code_metrics.c
      
    - name: Test metrics tool with Clang
      run: |
        ./metrics_tool_clang --version
        ./metrics_tool_clang --csv hello.c
      
    - name: Run metrics tool tests with Clang build
      run: bash test/test_metrics.sh
  
  # Memory safety checks with AddressSanitizer
  build-and-test-asan:
    runs-on: ubuntu-latest
    
    env:
      # AddressSanitizer flags for memory leak and undefined behavior detection
      ASAN_FLAGS: "-Wall -Wextra -Wpedantic -std=c99 -D_POSIX_C_SOURCE=200809L -fsanitize=address,undefined -fno-omit-frame-pointer -g"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build metrics tool with AddressSanitizer
      run: |
        gcc ${{ env.ASAN_FLAGS }} -o metrics_tool_asan metrics_tool.c code_metrics.c
      
    - name: Run tests with AddressSanitizer
      run: |
        export ASAN_OPTIONS=detect_leaks=1:halt_on_error=1
        ./metrics_tool_asan --version
        ./metrics_tool_asan --csv hello.c
        bash test/test_metrics.sh
      
    - name: Test signal handling cleanup
      run: |
        export ASAN_OPTIONS=detect_leaks=1:halt_on_error=1
        # Test SIGINT handling: start tool in background, send SIGINT, verify clean exit
        ./metrics_tool_asan -n hello.c &
        PID=$!
        sleep 0.3
        kill -SIGINT $PID || true
        wait $PID || EXIT_CODE=$?
        # Exit code 130 (128+2) is expected for SIGINT
        if [ "${EXIT_CODE:-0}" -eq 130 ] || [ "${EXIT_CODE:-0}" -eq 0 ]; then
          echo "✓ SIGINT handling test passed (exit code: ${EXIT_CODE:-0})"
        else
          echo "✗ SIGINT handling test failed (unexpected exit code: ${EXIT_CODE:-0})"
          exit 1
        fi
        
        # Test SIGTERM handling
        ./metrics_tool_asan -n hello.c &
        PID=$!
        sleep 0.3
        kill -SIGTERM $PID || true
        wait $PID || EXIT_CODE=$?
        # Exit code 143 (128+15) is expected for SIGTERM
        if [ "${EXIT_CODE:-0}" -eq 143 ] || [ "${EXIT_CODE:-0}" -eq 0 ]; then
          echo "✓ SIGTERM handling test passed (exit code: ${EXIT_CODE:-0})"
        else
          echo "✗ SIGTERM handling test failed (unexpected exit code: ${EXIT_CODE:-0})"
          exit 1
        fi
