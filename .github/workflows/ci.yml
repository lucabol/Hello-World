name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-gcc:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
      
    - name: Print environment versions
      run: |
        echo "Node.js version: $(node --version)"
        echo "GCC version: $(gcc --version | head -1)"
        echo "Make version: $(make --version | head -1)"
      
    - name: Build with GCC (with warnings)
      run: gcc -Wall -Wextra -o hello hello.c
      
    - name: Run unit tests
      run: make unit-test
      
    - name: Run validation tests
      run: bash test/validate.sh --quiet
      
    - name: Test visual editor generated code
      run: bash test/test_editor_output.sh
      
    - name: Test XSS escaping function
      run: node test/test_escape_html.js
      
    - name: Test XSS integration
      run: node test/test_xss_integration.js
      
    - name: Test plugin system
      run: |
        echo "Testing plugin system with GCC..."
        chmod +x test_plugins.sh
        ./test_plugins.sh
      
  build-and-test-clang:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build with Clang
      run: clang -Wall -Wextra -o hello_clang hello.c
      
    - name: Test Clang build
      run: ./hello_clang
      
    - name: Run unit tests with Clang
      run: |
        clang -Wall -Wextra -Wpedantic -Wformat=2 -Wconversion -Wsign-conversion -Werror -std=c99 -I. -c -o hello_lib.o hello.c -DUNIT_TEST
        clang -Wall -Wextra -Wpedantic -Wformat=2 -Wconversion -Wsign-conversion -Werror -std=c99 -I. -o test_hello_runner test/test_hello.c hello_lib.o
        ./test_hello_runner
        rm -f hello_lib.o test_hello_runner
      
    - name: Test plugin system with Clang
      run: |
        echo "Testing plugin system with Clang..."
        # Test basic compilation
        clang -Wall -Wextra -Wpedantic -o hello_clang_basic hello.c
        OUTPUT=$(./hello_clang_basic)
        if ! printf '%s' "$OUTPUT" | grep -Fxq "Hello world!"; then
          echo "ERROR: Expected 'Hello world!', got '$OUTPUT'"
          exit 1
        fi
        
        # Test with plugins - use grep for robust comparison
        clang -Wall -Wextra -Wpedantic -DUSE_PLUGINS -o hello_clang_plugins hello.c plugin.c plugin_uppercase.c
        OUTPUT=$(./hello_clang_plugins)
        if ! printf '%s' "$OUTPUT" | grep -Fxq "HELLO WORLD!"; then
          echo "ERROR: Expected 'HELLO WORLD!', got '$OUTPUT'"
          exit 1
        fi
        echo "✓ Clang plugin test passed"
        
        # Test multiple plugins chaining
        clang -Wall -Wextra -Wpedantic -DUSE_PLUGINS -o hello_clang_chain hello.c plugin.c plugin_decorator.c plugin_uppercase.c
        if ! ./hello_clang_chain | grep -q "HELLO WORLD!"; then
          echo "ERROR: Plugin chaining failed"
          exit 1
        fi
        echo "✓ Clang chaining test passed"
        
        # Test strict compilation
        clang -Wall -Wextra -Wpedantic -Werror -std=c99 -DUSE_PLUGINS -o hello_clang_strict hello.c plugin.c plugin_uppercase.c plugin_decorator.c plugin_logger.c
        if ! ./hello_clang_strict | grep -q "HELLO WORLD!"; then
          echo "ERROR: Strict compilation test failed"
          exit 1
        fi
        echo "✓ Clang strict compilation test passed"
        
        echo "All Clang plugin tests passed!"
        
  test-plugin-strict:
    runs-on: ubuntu-latest
    name: Test plugins with strict compilation flags
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Test strict compilation (GCC)
      run: |
        echo "Testing strict compilation with GCC..."
        make strict-plugins
        ./hello_strict_plugins | grep -q "HELLO WORLD!"
        
    - name: Test strict compilation (Clang)
      run: |
        echo "Testing strict compilation with Clang..."
        clang -Wall -Wextra -Wpedantic -Wformat=2 -Wconversion -Wsign-conversion -Werror -std=c99 -DUSE_PLUGINS -o hello_clang_strict hello.c plugin.c plugin_uppercase.c plugin_decorator.c plugin_logger.c
        ./hello_clang_strict | grep -q "HELLO WORLD!"
