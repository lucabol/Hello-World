name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Build and test with GCC - focuses on C compilation and validation
  build-and-test-gcc:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
      
    - name: Print environment versions
      run: |
        echo "Node.js version: $(node --version)"
        echo "GCC version: $(gcc --version | head -1)"
      
    - name: Build with GCC (with warnings)
      run: gcc -Wall -Wextra -o hello hello.c
      
    - name: Test GCC build
      run: ./hello
      
    - name: Run unit tests
      run: make unit-test
      
    - name: Run validation tests
      run: bash test/validate.sh --quiet
      
    - name: Test visual editor generated code
      run: bash test/test_editor_output.sh
      
    - name: Test XSS escaping function
      run: node test/test_escape_html.js
      
    - name: Build code_metrics with strict flags
      run: gcc -Wall -Wextra -Wpedantic -Wformat=2 -Wconversion -Wsign-conversion -Werror -std=c11 -o code_metrics code_metrics.c
      
    - name: Run code_metrics test suite
      run: |
        export LANG=C.UTF-8
        export LC_ALL=C.UTF-8
        bash test/test_code_metrics.sh
      
  # Build and test with Clang - alternative C compiler validation
  build-and-test-clang:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build with Clang
      run: clang -Wall -Wextra -o hello_clang hello.c
      
    - name: Test Clang build
      run: ./hello_clang
      
    - name: Run unit tests with Clang
      run: |
        clang -Wall -Wextra -Wpedantic -Wformat=2 -Wconversion -Wsign-conversion -Werror -std=c99 -I. -c -o hello_lib.o hello.c -DUNIT_TEST
        clang -Wall -Wextra -Wpedantic -Wformat=2 -Wconversion -Wsign-conversion -Werror -std=c99 -I. -o test_hello_runner test/test_hello.c hello_lib.o
        ./test_hello_runner
        rm -f hello_lib.o test_hello_runner
    
    - name: Build code_metrics with Clang and strict flags
      run: clang -Wall -Wextra -Wpedantic -Wformat=2 -Wconversion -Wsign-conversion -Werror -std=c11 -o code_metrics code_metrics.c
      
    - name: Run code_metrics test suite with Clang
      run: |
        export LANG=C.UTF-8
        export LC_ALL=C.UTF-8
        bash test/test_code_metrics.sh

  # Performance benchmarks - tracks compilation time, binary size, and execution time
  performance-benchmarks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Print environment versions
      run: |
        echo "GCC version: $(gcc --version | head -1)"
        echo "Clang version: $(clang --version | head -1)"
        echo "Python version: $(python3 --version)"
    
    - name: Run performance benchmarks
      run: |
        chmod +x benchmarks/run_benchmarks.sh
        bash benchmarks/run_benchmarks.sh --skip-comparison
    
    - name: Run benchmark accuracy tests
      run: |
        chmod +x test/test_benchmarks.sh
        bash test/test_benchmarks.sh
    
    - name: Compare with baseline (if exists)
      run: |
        if [ -f benchmarks/baseline.json ]; then
          echo "Baseline found, comparing results..."
          chmod +x benchmarks/compare_benchmarks.py
          python3 benchmarks/compare_benchmarks.py
        else
          echo "No baseline found, skipping comparison"
          echo "To create a baseline, run: make benchmark-update-baseline"
        fi
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: |
          benchmarks/benchmark_results.json
          benchmarks/baseline.json
        retention-days: 90
    
    - name: Display benchmark summary
      if: always()
      run: |
        echo "## Benchmark Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Quick Stats" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f benchmarks/benchmark_results.json ]; then
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          python3 -m json.tool benchmarks/benchmark_results.json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📊 Full results available in the benchmark-results artifact" >> $GITHUB_STEP_SUMMARY
