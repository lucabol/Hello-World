name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Build and test with GCC - focuses on C compilation and validation
  build-and-test-gcc:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Print environment versions
      run: |
        echo "GCC version: $(gcc --version | head -1)"
      
    - name: Build with GCC (with warnings)
      run: gcc -Wall -Wextra -o hello hello.c
      
    - name: Test GCC build
      run: ./hello
      
    - name: Run unit tests
      run: make unit-test
      
    - name: Run validation tests
      run: bash test/validate.sh --quiet
  
  # Code coverage reporting with gcov/lcov
  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install lcov
      run: sudo apt-get update && sudo apt-get install -y lcov
      
    - name: Generate coverage report
      run: make coverage
      
    - name: Upload coverage HTML report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        retention-days: 30
      
    - name: Display coverage summary
      run: |
        echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Coverage report generated successfully!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        lcov --summary coverage/coverage.info 2>&1 | grep -E "(lines\.\.\.|functions\.\.\.)" >> $GITHUB_STEP_SUMMARY || true
      
    - name: Check coverage threshold
      run: |
        COVERAGE=$(lcov --summary coverage/coverage.info 2>&1 | grep "lines\.\.\." | awk '{print $2}' | cut -d'%' -f1)
        echo "Line coverage: $COVERAGE%"
        if (( $(echo "$COVERAGE < 80" | bc -l) )); then
          echo "⚠️  Warning: Coverage is below 80% threshold"
        else
          echo "✓ Coverage meets 80% threshold"
        fi
    
    # Optional: Upload to Codecov (requires CODECOV_TOKEN secret to be configured)
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage/coverage.info
        flags: unittests
        name: codecov-hello-world
        fail_ci_if_error: false
      continue-on-error: true
          
  # Build and test with Clang - alternative C compiler validation
  build-and-test-clang:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build with Clang
      run: clang -Wall -Wextra -o hello_clang hello.c
      
    - name: Test Clang build
      run: ./hello_clang
