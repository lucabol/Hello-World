name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Build and test with GCC - focuses on C compilation and validation
  build-and-test-gcc:
    runs-on: ubuntu-latest

    env:
      # Strict compilation flags for GCC (includes -Werror for CI quality assurance)
      # -Werror ensures warnings are treated as errors to catch potential issues early
      # This is intentional for CI to maintain high code quality
      GCC_FLAGS: "-Wall -Wextra -Wpedantic -Wformat=2 -Wconversion -Wsign-conversion -Werror -std=c99 -D_POSIX_C_SOURCE=200809L"
      # Force C locale for deterministic, locale-independent output
      LC_ALL: C

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'

    - name: Print environment versions
      run: |
        echo "Node.js version: $(node --version)"
        echo "GCC version: $(gcc --version | head -1)"

    - name: Build all targets with Makefile (using strict GCC flags)
      run: make all CFLAGS="$GCC_FLAGS" CFLAGS_METRICS="$GCC_FLAGS"

    - name: Test hello build
      run: ./hello

    - name: Test metrics tool
      run: |
        ./metrics_tool --version
        ./metrics_tool --help
        ./metrics_tool --csv hello.c
        ./metrics_tool -n hello.c

    - name: Run metrics tool tests
      run: METRICS_TOOL_BINARY=./metrics_tool bash test/test_metrics.sh

    - name: Run spreadsheet interface tests
      run: METRICS_TOOL_BINARY=./metrics_tool bash test/test_spreadsheet_interface.sh

    - name: Run unit tests
      run: make unit-test

    - name: Run validation tests
      run: bash test/validate.sh --quiet

    - name: Test visual editor generated code
      run: bash test/test_editor_output.sh

    - name: Test XSS escaping function
      run: node test/test_escape_html.js

  # Build and test with Clang - alternative C compiler validation
  build-and-test-clang:
    runs-on: ubuntu-latest

    env:
      # Portable compilation flags for Clang (no -Werror for cross-compiler compatibility)
      CLANG_FLAGS: "-Wall -Wextra -Wpedantic -Wformat=2 -Wconversion -Wsign-conversion -std=c99 -D_POSIX_C_SOURCE=200809L"
      # Force C locale for deterministic output
      LC_ALL: C

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Print environment versions
      run: |
        echo "Clang version: $(clang --version | head -1)"

    - name: Build with Clang using Makefile (using portable flags)
      run: make all CC=clang CFLAGS="$CLANG_FLAGS" CFLAGS_METRICS="$CLANG_FLAGS"

    - name: Build hello_clang separately for compatibility testing
      run: clang $CLANG_FLAGS -o hello_clang hello.c

    - name: Test Clang build
      run: ./hello_clang

    - name: Build code metrics tool with Clang using Makefile (using portable flags)
      run: make metrics_tool_clang CC=clang CFLAGS_METRICS="$CLANG_FLAGS"

    - name: Test metrics tool with Clang
      run: |
        ./metrics_tool_clang --version
        ./metrics_tool_clang --csv hello.c

    - name: Run metrics tool tests with Clang build
      run: METRICS_TOOL_BINARY=./metrics_tool_clang bash test/test_metrics.sh

    - name: Run spreadsheet interface tests with Clang build
      run: METRICS_TOOL_BINARY=./metrics_tool_clang bash test/test_spreadsheet_interface.sh

    - name: Run unit tests with Clang
      run: make unit-test CC=clang

  # Memory safety checks with AddressSanitizer
  build-and-test-asan:
    runs-on: ubuntu-latest

    env:
      # AddressSanitizer flags for memory leak and undefined behavior detection
      ASAN_FLAGS: "-Wall -Wextra -Wpedantic -std=c99 -D_POSIX_C_SOURCE=200809L -fsanitize=address,undefined -fno-omit-frame-pointer -g"
      # Force C locale for deterministic output
      LC_ALL: C

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build metrics tool with AddressSanitizer using Makefile
      run: make metrics_tool_asan CFLAGS_METRICS="$ASAN_FLAGS"
      env:
        ASAN_OPTIONS: detect_leaks=1:halt_on_error=1

    - name: Run tests with AddressSanitizer
      env:
        ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
      run: |
        ./metrics_tool_asan --version
        ./metrics_tool_asan --csv hello.c
        METRICS_TOOL_BINARY=./metrics_tool_asan bash test/test_metrics.sh
        METRICS_TOOL_BINARY=./metrics_tool_asan bash test/test_spreadsheet_interface.sh

    - name: Test signal handling cleanup
      env:
        ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
      run: bash test/test_signal_handling.sh ./metrics_tool_asan

  # CodeQL security analysis
  codeql-analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'c-cpp'
        queries: +security-and-quality

    - name: Build for CodeQL analysis
      run: |
        make all
        make metrics_tool

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:c-cpp"
