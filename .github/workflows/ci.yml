name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Docker-based build - ensures reproducible environment
  docker-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: hello-world-c:ci
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Run program in Docker container
      run: docker run --rm hello-world-c:ci
      
    - name: Run Docker consistency tests
      run: bash test/test_docker.sh
      
    - name: Test docker-compose
      run: docker compose run --rm test

  # Build and test with GCC
  build-and-test-gcc:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Print environment versions
      run: |
        echo "GCC version: $(gcc --version | head -1)"
      
    - name: Build with GCC (with warnings)
      run: gcc -Wall -Wextra -o hello hello.c
      
    - name: Test GCC build
      run: ./hello

  # Build and test with Clang
  build-and-test-clang:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Print environment versions
      run: |
        echo "Clang version: $(clang --version | head -1)"
      
    - name: Build with Clang
      run: clang -Wall -Wextra -o hello_clang hello.c
      
    - name: Test Clang build
      run: ./hello_clang

