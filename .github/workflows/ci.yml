name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Build and test with GCC - focuses on C compilation and validation
  build-and-test-gcc:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
      
    - name: Print environment versions
      run: |
        echo "Node.js version: $(node --version)"
        echo "GCC version: $(gcc --version | head -1)"
      
    - name: Build with GCC (with warnings)
      run: gcc -Wall -Wextra -o hello hello.c
      
    - name: Test GCC build
      run: ./hello
      
    - name: Run unit tests
      run: make unit-test
      
    - name: Run validation tests
      run: bash test/validate.sh --quiet
      
    - name: Test visual editor generated code
      run: bash test/test_editor_output.sh
      
    - name: Test XSS escaping function
      run: node test/test_escape_html.js
      
    - name: Test plugin system
      run: |
        echo "Testing plugin system with GCC..."
        chmod +x test_plugins.sh
        ./test_plugins.sh
      
  # Build and test with Clang - alternative C compiler validation
  build-and-test-clang:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build with Clang
      run: clang -Wall -Wextra -o hello_clang hello.c
      
    - name: Test Clang build
      run: ./hello_clang
      
    - name: Run unit tests with Clang
      run: |
        clang -Wall -Wextra -Wpedantic -Wformat=2 -Wconversion -Wsign-conversion -Werror -std=c99 -I. -c -o hello_lib.o hello.c -DUNIT_TEST
        clang -Wall -Wextra -Wpedantic -Wformat=2 -Wconversion -Wsign-conversion -Werror -std=c99 -I. -o test_hello_runner test/test_hello.c hello_lib.o
        ./test_hello_runner
        rm -f hello_lib.o test_hello_runner
      
    - name: Test plugin system with Clang
      run: |
        echo "Testing plugin system with Clang..."
        # Test basic compilation
        clang -Wall -Wextra -Wpedantic -o hello_clang_basic hello.c
        OUTPUT=$(./hello_clang_basic)
        if ! printf '%s' "$OUTPUT" | grep -Fq "Ciao, Mondo!"; then
          echo "ERROR: Expected greeting not found, got '$OUTPUT'"
          exit 1
        fi
        
        # Test with plugins - use grep for robust comparison
        clang -Wall -Wextra -Wpedantic -DUSE_PLUGINS -o hello_clang_plugins hello.c plugin.c plugin_uppercase.c
        OUTPUT=$(./hello_clang_plugins)
        if ! printf '%s' "$OUTPUT" | grep -Fq "CIAO, MONDO!"; then
          echo "ERROR: Expected 'CIAO, MONDO!', got '$OUTPUT'"
          exit 1
        fi
        echo "✓ Clang plugin test passed"
        
        # Test multiple plugins chaining
        clang -Wall -Wextra -Wpedantic -DUSE_PLUGINS -o hello_clang_chain hello.c plugin.c plugin_decorator.c plugin_uppercase.c
        if ! ./hello_clang_chain | grep -q "CIAO, MONDO!"; then
          echo "ERROR: Plugin chaining failed"
          exit 1
        fi
        echo "✓ Clang chaining test passed"
        
        # Test strict compilation
        clang -Wall -Wextra -Wpedantic -Werror -std=c99 -DUSE_PLUGINS -o hello_clang_strict hello.c plugin.c plugin_uppercase.c plugin_decorator.c plugin_logger.c
        if ! ./hello_clang_strict | grep -q "CIAO, MONDO!"; then
          echo "ERROR: Strict compilation test failed"
          exit 1
        fi
        echo "✓ Clang strict compilation test passed"
        
        echo "All Clang plugin tests passed!"
        
  test-plugin-strict:
    runs-on: ubuntu-latest
    name: Test plugins with strict compilation flags
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Test strict compilation (GCC)
      run: |
        echo "Testing strict compilation with GCC..."
        make strict-plugins
        ./hello_strict_plugins | grep -q "CIAO, MONDO!"
        
    - name: Test strict compilation (Clang)
      run: |
        echo "Testing strict compilation with Clang..."
        clang -Wall -Wextra -Wpedantic -Wformat=2 -Wconversion -Wsign-conversion -Werror -std=c99 -DUSE_PLUGINS -o hello_clang_strict hello.c plugin.c plugin_uppercase.c plugin_decorator.c plugin_logger.c
        ./hello_clang_strict | grep -q "CIAO, MONDO!"
  
  # Memory safety testing with Valgrind
  test-memory-safety:
    runs-on: ubuntu-latest
    name: Memory safety checks (Valgrind)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Valgrind
      run: sudo apt-get update && sudo apt-get install -y valgrind
      
    - name: Build with debug symbols
      run: |
        gcc -g -DUSE_PLUGINS -o hello_valgrind hello.c plugin.c plugin_uppercase.c plugin_decorator.c
        
    - name: Run Valgrind leak check
      run: |
        valgrind --leak-check=full --error-exitcode=1 --show-leak-kinds=all ./hello_valgrind
        
    - name: Run Valgrind with heap mode
      run: |
        gcc -g -DUSE_PLUGINS -DPLUGIN_USE_HEAP -o hello_valgrind_heap hello.c plugin.c plugin_uppercase.c
        valgrind --leak-check=full --error-exitcode=1 --show-leak-kinds=all ./hello_valgrind_heap
  
  # AddressSanitizer testing
  test-asan:
    runs-on: ubuntu-latest
    name: AddressSanitizer checks
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build with ASAN (stack mode)
      run: |
        gcc -fsanitize=address -fno-omit-frame-pointer -g -DUSE_PLUGINS -o hello_asan hello.c plugin.c plugin_uppercase.c plugin_decorator.c
        
    - name: Run ASAN checks
      run: ./hello_asan
      
    - name: Build with ASAN (heap mode)
      run: |
        gcc -fsanitize=address -fno-omit-frame-pointer -g -DUSE_PLUGINS -DPLUGIN_USE_HEAP -o hello_asan_heap hello.c plugin.c plugin_uppercase.c
        
    - name: Run ASAN checks (heap mode)
      run: ./hello_asan_heap
  
  # Windows/MSVC testing with manual registration
  test-windows-msvc:
    runs-on: windows-latest
    name: Windows MSVC manual registration
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2
      
    - name: Create manual registration test file
      shell: bash
      run: |
        cat > test_manual_registration.c << 'EOF'
        #define PLUGIN_MANUAL_REGISTRATION
        #include "hello.h"
        #include "plugin.h"
        #include <stdio.h>
        
        // Uppercase plugin
        int uppercase_transform(const char* input, char* output, size_t output_size);
        
        int main(void) {
            // Manual registration for MSVC
            int result = plugin_register("Uppercase", uppercase_transform, NULL, NULL);
            if (result != PLUGIN_SUCCESS) {
                fprintf(stderr, "Failed to register plugin: %d\n", result);
                return 1;
            }
            
            // Now run hello with plugins
            const char* greeting = get_greeting();
            printf("Original: %s\n", greeting);
            
            #ifdef USE_PLUGINS
            char output[PLUGIN_BUFFER_SIZE];
            result = plugin_execute_transforms(greeting, output, PLUGIN_BUFFER_SIZE);
            if (result == PLUGIN_SUCCESS) {
                printf("Transformed: %s\n", output);
            }
            #endif
            
            return 0;
        }
        EOF
        
    - name: Compile with MSVC
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        cl /W4 /DUSE_PLUGINS /DPLUGIN_MANUAL_REGISTRATION /I. /c hello.c
        cl /W4 /DUSE_PLUGINS /DPLUGIN_MANUAL_REGISTRATION /I. /c plugin.c
        cl /W4 /DUSE_PLUGINS /DPLUGIN_MANUAL_REGISTRATION /I. /c plugin_uppercase.c
        cl /W4 /DUSE_PLUGINS /DPLUGIN_MANUAL_REGISTRATION /I. test_manual_registration.c hello.obj plugin.obj plugin_uppercase.obj
        
    - name: Run MSVC test
      shell: cmd
      run: test_manual_registration.exe
