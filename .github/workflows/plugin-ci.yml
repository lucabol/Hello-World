name: Plugin System CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    name: Build and Test Plugin System
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build with strict flags (${{ matrix.compiler }})
      run: |
        set -e
        make clean
        CC=${{ matrix.compiler }} make strict
        ./hello_strict
    
    - name: Run unit tests (${{ matrix.compiler }})
      run: |
        set -e
        CC=${{ matrix.compiler }} make unit-test
    
    - name: Build all demo programs (${{ matrix.compiler }})
      run: |
        set -e
        make clean
        CC=${{ matrix.compiler }} make plugin_demo
        CC=${{ matrix.compiler }} make hello-plugins
        CC=${{ matrix.compiler }} make custom_plugin_example
    
    - name: Test plugin demo
      run: |
        set -e
        ./plugin_demo
    
    - name: Test hello with plugins
      run: |
        set -e
        ./hello_with_plugins
    
    - name: Test custom plugin example
      run: |
        set -e
        ./custom_plugin_example
    
    - name: Upload test results on failure
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.compiler }}
        path: |
          *.log
          test/*.log
  
  sanitizers:
    name: Memory Safety Tests (ASAN/UBSAN)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run tests with ASAN/UBSAN
      run: |
        set -e
        make asan 2>&1 | tee asan-output.log
    
    - name: Upload sanitizer logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: sanitizer-logs
        path: asan-output.log
  
  backwards-compatibility:
    name: Test Backwards Compatibility
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Test hello without plugins
      run: |
        set -e
        make clean
        make hello
        output=$(./hello)
        expected="Hello world!"
        if [ "$output" = "$expected" ]; then
          echo "✓ Output matches expected: '$output'"
        else
          echo "✗ Output mismatch. Expected: '$expected', Got: '$output'"
          exit 1
        fi
    
    - name: Verify exit code
      run: |
        set -e
        ./hello
        exit_code=$?
        if [ $exit_code -eq 0 ]; then
          echo "✓ Exit code is 0"
        else
          echo "✗ Exit code is $exit_code"
          exit 1
        fi
