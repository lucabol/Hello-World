<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaborative Editor - hello.c</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Modal (shown when authentication required) -->
    <div id="login-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Authentication Required</h2>
            <p>Please enter your authentication token:</p>
            <div class="form-group">
                <label for="auth-token">Token:</label>
                <input type="password" id="auth-token" class="form-control" placeholder="Enter token" />
            </div>
            <div class="form-actions">
                <button id="login-btn" class="btn btn-primary">Login</button>
            </div>
            <div id="login-error" class="error-message" style="display: none;"></div>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>Collaborative Editor: hello.c</h1>
            <div class="status">
                <span id="connection-status" class="status-badge disconnected">Disconnected</span>
                <span id="version-info" class="version-info">Version: 0</span>
            </div>
        </header>
        
        <div class="editor-container">
            <div class="sidebar">
                <h3>Connected Users</h3>
                <ul id="users-list" class="users-list"></ul>
                
                <div class="user-settings">
                    <label for="username">Your Name:</label>
                    <input type="text" id="username" placeholder="Enter your name" />
                </div>
            </div>
            
            <div class="editor-area">
                <div class="toolbar">
                    <button id="save-btn" class="btn">Save</button>
                    <button id="reload-btn" class="btn">Reload</button>
                    <span id="save-status" class="save-status"></span>
                </div>
                
                <textarea 
                    id="editor" 
                    class="code-editor" 
                    spellcheck="false"
                    placeholder="Loading hello.c..."
                ></textarea>
                
                <div class="editor-info">
                    <span id="cursor-position">Line 1, Col 1</span>
                    <span id="char-count">0 characters</span>
                </div>
            </div>
        </div>
        
        <div class="notifications" id="notifications"></div>
    </div>
    
    <script src="editor.js"></script>
</body>
</html>
