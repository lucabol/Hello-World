<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Visual C Code Editor</title>
    <meta name="description" content="Visual block-based editor for C code with drag-and-drop support">
    <!--
        Content Security Policy (CSP) Compatibility:
        This editor uses inline styles and scripts for simplicity and zero dependencies.
        
        For strict CSP environments, use these exact hashes:
        
        Content-Security-Policy: default-src 'none'; 
            style-src 'sha256-AhJg7cRrY528/OzfSZ+Dl0QTqD1Ibc/mXzEBX0GOoVE='; 
            script-src 'sha256-roPm8L2Q//kEikZKoLTL0Rl1Ec3pkpWI+1mDl/qHfQE='; 
            img-src data:;
        
        To recompute hashes after modifications:
        - Style: awk '/<style>/,/<\/style>/' editor.html | openssl dgst -sha256 -binary | openssl base64
        - Script: awk '/<script>/,/<\/script>/' editor.html | openssl dgst -sha256 -binary | openssl base64
        
        Alternative: Externalize styles/scripts for nonce-based CSP.
        See SECURITY_REVIEW.md for complete CSP documentation.
    -->
    <style>
        /**
         * Visual C Code Editor Styles
         * Scoped with .vce- prefix to avoid conflicts
         * WCAG AA compliant color contrast ratios
         */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Focus styles for accessibility */
        *:focus {
            outline: 3px solid #ffd700;
            outline-offset: 2px;
        }
        
        .vce-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .vce-header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .vce-header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .vce-container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Mobile responsive layout */
        @media (max-width: 768px) {
            .vce-container {
                flex-direction: column;
            }
            
            .vce-block-palette,
            .vce-code-output {
                flex: 1 1 auto;
                max-height: none;
            }
        }
        
        .vce-panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .vce-block-palette {
            flex: 0 0 250px;
            overflow-y: auto;
            max-height: calc(100vh - 180px);
        }
        
        .vce-block-palette h2 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.3em;
        }
        
        .vce-workspace {
            flex: 1;
            min-height: 500px;
            position: relative;
            background: linear-gradient(#f8f9fa 1px, transparent 1px),
                        linear-gradient(90deg, #f8f9fa 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .vce-workspace h2 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.3em;
        }
        
        .vce-code-output {
            flex: 0 0 350px;
            display: flex;
            flex-direction: column;
        }
        
        .vce-code-output h2 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.3em;
        }
        
        .vce-code-display {
            flex: 1;
            background: #282c34;
            color: #abb2bf;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            overflow-y: auto;
            white-space: pre;
            line-height: 1.6;
        }
        
        .vce-block {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
        }
        
        .vce-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.25);
        }
        
        .vce-block:active,
        .vce-block.vce-selected {
            transform: translateY(0);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        
        .vce-block-title {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.95em;
        }
        
        .vce-block-description {
            font-size: 0.85em;
            opacity: 0.9;
        }
        
        .vce-workspace-block {
            background: white;
            border: 2px solid #667eea;
            color: #333;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        
        .vce-workspace-block .vce-block-header {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .vce-workspace-block input,
        .vce-workspace-block textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-top: 5px;
        }
        
        .vce-workspace-block textarea {
            resize: vertical;
            min-height: 60px;
        }
        
        .vce-remove-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: background 0.2s;
        }
        
        .vce-remove-btn:hover {
            background: #c0392b;
        }
        
        .vce-drop-zone {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            color: #999;
            margin: 10px 0;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .vce-drop-zone.vce-drag-over {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
            color: #667eea;
        }
        
        .vce-export-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .vce-export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .vce-export-btn:active {
            transform: translateY(0);
        }
        
        .vce-visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        
        .vce-keyboard-help {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 0.85em;
            color: #666;
        }
    </style>
</head>
<body>
    <header class="vce-header">
        <h1>🧱 Visual C Code Editor</h1>
        <p>Drag and drop blocks to build your C program (keyboard accessible)</p>
    </header>
    
    <main class="vce-main">
    <div class="vce-container">
        <div class="vce-panel vce-block-palette">
            <h2>📦 Block Palette</h2>
            <div class="vce-block" tabindex="0" role="button" aria-label="Add include block" data-type="include">
                <div class="vce-block-title">#include</div>
                <div class="vce-block-description">Include header file</div>
            </div>
            <div class="vce-block" tabindex="0" role="button" aria-label="Add printf block" data-type="printf">
                <div class="vce-block-title">printf()</div>
                <div class="vce-block-description">Print text output</div>
            </div>
            <div class="vce-block" tabindex="0" role="button" aria-label="Add return block" data-type="return">
                <div class="vce-block-title">return</div>
                <div class="vce-block-description">Return value</div>
            </div>
            <div class="vce-keyboard-help">
                <strong>Keyboard:</strong> Tab to select, Enter/Space to add block
            </div>
        </div>
        
        <div class="vce-panel vce-workspace">
            <h2>🔨 Workspace</h2>
            <div id="vce-workspace-area" role="region" aria-label="Code workspace">
                <!-- Blocks will be dropped here -->
            </div>
        </div>
        
        <div class="vce-panel vce-code-output">
            <h2>💻 Generated Code</h2>
            <pre class="vce-code-display" id="vce-code-display" role="log" aria-live="polite" aria-label="Generated C code"></pre>
            <button class="vce-export-btn" id="vce-export-btn" aria-label="Export code to hello.c file">📥 Export to hello.c</button>
        </div>
    </div>
    </main>
    
    <script>
/**
 * Visual C Code Editor
 * 
 * A web-based block editor for creating C programs.
 * 
 * Security Features:
 * - All user input is escaped using escapeHtml() before HTML insertion
 * - Element innerHTML property only used with escaped values in controlled scenarios
 * - textContent used for all code display (prevents XSS)
 * - Hardcoded export filename (prevents path traversal)
 * - Input validation on header names and values
 * 
 * Accessibility Features:
 * - Full keyboard navigation support
 * - ARIA labels and roles throughout
 * - Focus management and visible focus indicators
 * - Screen reader announcements
 * 
 * Browser Compatibility:
 * - Chrome/Edge 90+
 * - Firefox 88+
 * - Safari 14+
 * - Modern mobile browsers with touch support
 * 
 * Global Variables: None (wrapped in IIFE)
 */
(function() {
    'use strict';
    
    // Editor state
    let blocks = [];
    let blockIdCounter = 0;
    let selectedPaletteBlock = null;
    
    // DOM elements
    const workspaceArea = document.getElementById('vce-workspace-area');
    const codeDisplay = document.getElementById('vce-code-display');
    const exportBtn = document.getElementById('vce-export-btn');
    
    /**
     * Security: Escape HTML to prevent XSS attacks
     * Used before inserting user content into HTML attributes
     * 
     * @param {string} text - Text to escape
     * @returns {string} - Escaped HTML-safe text
     */
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    /**
     * Escape string for safe use in C source code
     * Handles backslashes, quotes, and escape sequences
     * 
     * @param {string} text - Text to escape for C
     * @returns {string} - C-safe escaped text
     * 
     * Note: This function is used to escape user strings that will be passed
     * as DATA to printf (not as format strings). The generated code uses
     * printf("%s", userString) to prevent format string vulnerabilities.
     * 
     * Therefore, '%' characters in user input are preserved as literals and
     * will be safely printed as-is (e.g., "100%" outputs "100%").
     * 
     * NUL bytes: JavaScript strings cannot contain binary NUL (\0). If somehow
     * present in input, they would terminate the C string at that point.
     */
    function escapeCString(text) {
        return text
            .replace(/\\/g, '\\\\')   // Escape backslashes first
            .replace(/"/g, '\\"')     // Escape double quotes
            .replace(/\n/g, '\\n')    // Keep newline escapes
            .replace(/\t/g, '\\t')    // Keep tab escapes
            .replace(/\r/g, '\\r');   // Keep carriage return escapes
            // Note: '%' is NOT escaped - it will be printed literally via printf("%s", ...)
    }
    
    /**
     * Validate header file name
     * Only allows alphanumeric, dots, hyphens, underscores
     * Explicitly rejects:
     * - Path traversal (..)
     * - Backslashes (Windows paths)
     * - Protocol schemes (http://, file://)
     * - Absolute paths (leading /)
     * - Multiple consecutive slashes
     * 
     * @param {string} header - Header filename to validate
     * @returns {boolean} - True if valid
     */
    function isValidHeader(header) {
        // Reject path traversal attempts
        if (header.includes('..')) {
            return false;
        }
        
        // Reject backslashes (Windows paths, UNC paths)
        if (header.includes('\\')) {
            return false;
        }
        
        // Reject protocol schemes (http://, file://, etc.)
        if (header.includes('://')) {
            return false;
        }
        
        // Reject absolute paths (leading slash)
        if (header.startsWith('/')) {
            return false;
        }
        
        // Reject multiple consecutive slashes
        if (/\/\//.test(header)) {
            return false;
        }
        
        // Allow standard header patterns like stdio.h, sys/types.h
        // Permits: letters, numbers, underscore, dot, hyphen, single forward slashes
        const pattern = /^[a-zA-Z0-9_.-]+(\/[a-zA-Z0-9_.-]+)*$/;
        return pattern.test(header) && header.length < 100;
    }
    
    /**
     * Deduplicate includes - keep first occurrence
     * 
     * @param {Array} includeBlocks - Array of include block objects
     * @returns {Array} - Deduplicated array
     */
    function deduplicateIncludes(includeBlocks) {
        const seen = new Set();
        return includeBlocks.filter(block => {
            const normalized = block.value.trim().toLowerCase();
            if (seen.has(normalized)) {
                return false;
            }
            seen.add(normalized);
            return true;
        });
    }
    
    /**
     * Debounced code generation
     * Prevents excessive updates during rapid typing
     */
    let generateCodeTimeout = null;
    function debouncedGenerateCode() {
        clearTimeout(generateCodeTimeout);
        generateCodeTimeout = setTimeout(generateCode, 150);
    }
    
    /**
     * Initialize with default program
     */
    function initializeDefaultProgram() {
        blocks = [
            { id: blockIdCounter++, type: 'include', value: 'stdio.h' },
            { id: blockIdCounter++, type: 'printf', value: 'Ciao, Mondo!\\n' },
            { id: blockIdCounter++, type: 'return', value: '0' }
        ];
        renderWorkspace();
        generateCode();
    }
    
    /**
     * Setup drag and drop handlers for palette blocks
     */
    function setupDragAndDrop() {
        const paletteBlocks = document.querySelectorAll('.vce-block-palette .vce-block');
        
        paletteBlocks.forEach(block => {
            // Drag support for mouse
            block.setAttribute('draggable', 'true');
            
            block.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('blockType', block.dataset.type);
                e.dataTransfer.effectAllowed = 'copy';
                block.classList.add('vce-selected');
            });
            
            block.addEventListener('dragend', () => {
                block.classList.remove('vce-selected');
            });
            
            // Keyboard support
            block.addEventListener('click', () => {
                addBlock(block.dataset.type);
            });
            
            block.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    addBlock(block.dataset.type);
                    announceToScreenReader(`Added ${block.dataset.type} block to workspace`);
                }
            });
            
            // Touch support
            block.addEventListener('touchstart', (e) => {
                selectedPaletteBlock = block.dataset.type;
                block.classList.add('vce-selected');
            }, { passive: true });
            
            block.addEventListener('touchend', (e) => {
                block.classList.remove('vce-selected');
                // Touch-to-add: just add the block on tap
                if (selectedPaletteBlock) {
                    addBlock(selectedPaletteBlock);
                    selectedPaletteBlock = null;
                }
            }, { passive: true });
        });
        
        // Setup workspace drop zone
        workspaceArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
            workspaceArea.classList.add('vce-drag-over');
        });
        
        workspaceArea.addEventListener('dragleave', () => {
            workspaceArea.classList.remove('vce-drag-over');
        });
        
        workspaceArea.addEventListener('drop', (e) => {
            e.preventDefault();
            workspaceArea.classList.remove('vce-drag-over');
            
            const blockType = e.dataTransfer.getData('blockType');
            if (blockType) {
                addBlock(blockType);
            }
        });
    }
    
    /**
     * Add a new block to the workspace
     * 
     * @param {string} type - Block type (include, printf, return)
     */
    function addBlock(type) {
        let defaultValue = '';
        
        switch(type) {
            case 'include':
                defaultValue = 'stdio.h';
                break;
            case 'printf':
                defaultValue = 'Hello world!';
                break;
            case 'return':
                defaultValue = '0';
                break;
        }
        
        // Defensive: escape default value for safety
        const safeValue = escapeHtml(defaultValue);
        const newBlock = {
            id: blockIdCounter++,
            type: type,
            value: defaultValue
        };
        
        blocks.push(newBlock);
        
        renderWorkspace();
        debouncedGenerateCode();
    }
    
    /**
     * Remove a block from the workspace
     * 
     * @param {number} id - Block ID to remove
     */
    function removeBlock(id) {
        const blockIndex = blocks.findIndex(b => b.id === id);
        if (blockIndex === -1) return;
        
        const blockType = blocks[blockIndex].type;
        blocks = blocks.filter(block => block.id !== id);
        
        renderWorkspace();
        generateCode();
        announceToScreenReader(`Removed ${blockType} block`);
    }
    
    /**
     * Update a block's value
     * 
     * @param {number} id - Block ID
     * @param {string} newValue - New value
     */
    function updateBlockValue(id, newValue) {
        const block = blocks.find(b => b.id === id);
        if (block) {
            block.value = newValue;
            debouncedGenerateCode();
        }
    }
    
    /**
     * Render the workspace with all blocks
     * Uses textContent and escapeHtml to prevent XSS
     */
    function renderWorkspace() {
        if (blocks.length === 0) {
            const dropZone = document.createElement('div');
            dropZone.className = 'vce-drop-zone';
            dropZone.textContent = 'Drop blocks here or use keyboard to add blocks from the palette';
            workspaceArea.innerHTML = '';
            workspaceArea.appendChild(dropZone);
            return;
        }
        
        // Clear workspace
        workspaceArea.innerHTML = '';
        
        blocks.forEach((block, index) => {
            const blockEl = document.createElement('div');
            blockEl.className = 'vce-workspace-block';
            blockEl.setAttribute('role', 'article');
            blockEl.setAttribute('aria-label', `${block.type} block ${index + 1}`);
            
            // Create header
            const header = document.createElement('div');
            header.className = 'vce-block-header';
            
            const label = document.createElement('span');
            // Escape block type for safety (defensive coding)
            const escapedType = escapeHtml(block.type);
            label.textContent = block.type === 'include' ? '#include' : 
                               block.type === 'printf' ? 'printf()' : 'return';
            header.appendChild(label);
            
            const removeBtn = document.createElement('button');
            removeBtn.className = 'vce-remove-btn';
            removeBtn.textContent = '✕ Remove';
            removeBtn.setAttribute('aria-label', `Remove ${block.type} block`);
            removeBtn.onclick = () => removeBlock(block.id);
            header.appendChild(removeBtn);
            
            blockEl.appendChild(header);
            
            // Create input field based on block type
            if (block.type === 'include') {
                const input = document.createElement('input');
                input.type = 'text';
                input.value = block.value;
                input.placeholder = 'Enter header file (e.g., stdio.h)';
                input.setAttribute('aria-label', 'Header file name');
                input.oninput = (e) => {
                    const val = e.target.value;
                    if (!val || isValidHeader(val)) {
                        updateBlockValue(block.id, val);
                        input.setCustomValidity('');
                    } else {
                        input.setCustomValidity('Invalid header name. Use only alphanumeric, dots, hyphens, and underscores.');
                    }
                };
                blockEl.appendChild(input);
            } else if (block.type === 'printf') {
                const textarea = document.createElement('textarea');
                textarea.value = block.value;
                textarea.placeholder = 'Enter text to print (use \\n for newline)';
                textarea.setAttribute('aria-label', 'Printf text content');
                textarea.oninput = (e) => updateBlockValue(block.id, e.target.value);
                blockEl.appendChild(textarea);
            } else if (block.type === 'return') {
                const input = document.createElement('input');
                input.type = 'text';
                input.value = block.value;
                input.placeholder = 'Enter return value (e.g., 0)';
                input.setAttribute('aria-label', 'Return value');
                input.oninput = (e) => updateBlockValue(block.id, e.target.value);
                blockEl.appendChild(input);
            }
            
            workspaceArea.appendChild(blockEl);
        });
    }
    
    /**
     * Generate C code from blocks
     * Applies proper escaping and deduplication
     */
    function generateCode() {
        let code = '';
        
        // Group blocks by type
        const includes = blocks.filter(b => b.type === 'include');
        const statements = blocks.filter(b => b.type === 'printf' || b.type === 'return');
        
        // Deduplicate and validate includes
        const uniqueIncludes = deduplicateIncludes(includes);
        
        // Add includes (validated and deduplicated)
        uniqueIncludes.forEach(block => {
            if (block.value && isValidHeader(block.value)) {
                // Escape header name for safety (defensive)
                const safeHeader = escapeHtml(block.value);
                code += `# include <${block.value}>\n`;
            }
        });
        
        if (uniqueIncludes.length > 0) {
            code += '\n';
        }
        
        // Add main function
        code += 'int main(){\n';
        
        // Add statements with proper C string escaping
        statements.forEach(block => {
            if (block.type === 'printf') {
                // Escape the string for C source code
                const escaped = escapeCString(block.value);
                // SECURITY: Use "%s" format to prevent user string from being interpreted as format
                // This prevents format string vulnerabilities where user input like "%s%s%s"
                // could crash the program or leak memory
                code += `    printf("%s", "${escaped}");\n`;
            } else if (block.type === 'return') {
                code += `    return ${block.value};\n`;
            }
        });
        
        code += '}';
        
        // Display using textContent (safe from XSS)
        displayCode(code);
    }
    
    /**
     * Display generated code
     * Uses textContent to prevent XSS
     * 
     * @param {string} code - Generated C code
     */
    function displayCode(code) {
        // Use textContent for security - prevents XSS
        codeDisplay.textContent = code;
    }
    
    /**
     * Export code to file
     * Filename is hardcoded for security (prevents path traversal)
     */
    function exportCode() {
        const code = codeDisplay.textContent;
        
        if (!code || code.trim() === '') {
            alert('No code to export');
            return;
        }
        
        // Create blob and download
        // Filename is hardcoded as 'hello.c' for security
        const blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = 'hello.c';  // Hardcoded filename for security
        a.textContent = 'Download';
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        
        // Cleanup
        setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }, 100);
        
        announceToScreenReader('Code exported successfully as hello.c');
    }
    
    /**
     * Announce message to screen readers
     * 
     * @param {string} message - Message to announce
     */
    function announceToScreenReader(message) {
        const announcement = document.createElement('div');
        announcement.setAttribute('role', 'status');
        announcement.setAttribute('aria-live', 'polite');
        announcement.className = 'vce-visually-hidden';
        announcement.textContent = message;
        document.body.appendChild(announcement);
        
        setTimeout(() => {
            document.body.removeChild(announcement);
        }, 1000);
    }
    
    // Initialize editor
    setupDragAndDrop();
    initializeDefaultProgram();
    
    // Setup export button
    exportBtn.addEventListener('click', exportCode);
    exportBtn.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            exportCode();
        }
    });
    
})();
    </script>
</body>
